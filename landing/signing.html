<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matager | Build Your Store</title>
    <link rel="icon" type="image/png" href="./assets/img/favico.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/output.css" />
    <link rel="stylesheet" href="./assets/css/keyframes.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: white;
            overflow: hidden;
        }

        /* Original Reveal Animations */
        @keyframes revealWord {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(5px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes zoomIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reveal {
            opacity: 0;
        }

        .animate-up {
            animation: revealWord 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .animate-zoom {
            animation: zoomIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Option Cards (Shopify Style) */
        .option-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .option-card.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Step Dot logic */
        .dot-glow {
            background: white !important;
            shadow: 0 0 12px #fff;
            opacity: 1 !important;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-start pt-[30px] px-4 md:justify-center md:pt-0">

    <div class="fixed inset-0 -z-10">
        <div class="absolute rounded-full -top-20 -left-20 w-[500px] h-[500px] bg-[#0ea5e9] blur-[120px] opacity-10">
        </div>
        <div
            class="absolute rounded-full -bottom-20 -right-20 w-[500px] h-[500px] bg-[#4f46e5] blur-[120px] opacity-10">
        </div>
    </div>

    <img src="./assets/img/Logo.png" alt="logo" class="h-14 w-auto mb-5 opacity-90 animate-up">

    <div id="step-indicators" class="flex items-center gap-2 mb-5 transition-all duration-500">
        <div class="dot w-2.5 h-2.5 rounded-full bg-white shadow-[0_0_12px_#fff] animate-up"
            style="animation-delay: 100ms"></div>
        <div class="w-8 h-[1px] bg-white/10 animate-up" style="animation-delay: 150ms"></div>
        <div class="dot w-1.5 h-1.5 rounded-full bg-white/20 animate-up" style="animation-delay: 200ms"></div>
        <div class="w-8 h-[1px] bg-white/10 animate-up" style="animation-delay: 250ms"></div>
        <div class="dot w-1.5 h-1.5 rounded-full bg-white/20 animate-up" style="animation-delay: 300ms"></div>
        <div class="w-8 h-[1px] bg-white/10 animate-up" style="animation-delay: 350ms"></div>
        <div class="dot w-1.5 h-1.5 rounded-full bg-white/20 animate-up" style="animation-delay: 400ms"></div>
        <div class="w-8 h-[1px] bg-white/10 animate-up" style="animation-delay: 450ms"></div>
        <div class="dot w-1.5 h-1.5 rounded-full bg-white/20 animate-up" style="animation-delay: 500ms"></div>
        <div class="w-8 h-[1px] bg-white/10 animate-up" style="animation-delay: 550ms"></div>
        <div class="dot w-1.5 h-1.5 rounded-full bg-white/20 animate-up" style="animation-delay: 600ms"></div>
    </div>

    <div id="main-card" class="glass-card w-full max-w-[450px] p-10 rounded-[30px]  min-h-[380.5px]"
        style="animation-delay: 200ms">
        <div id="step-content" class="reveal animate-up [animation-delay:400ms] ">
        </div>

        <div id="action-bar" class="mt-8 flex items-center justify-between reveal animate-up [animation-delay:450ms]">
            <button id="back-btn" onclick="prevStep()"
                class="text-sm text-white/30 hover:text-white transition-colors hidden"><i
                    class="bi bi-arrow-left-short"></i> Back</button>
            <button id="next-btn" onclick="nextStep()"
                class="ml-auto bg-white text-black font-bold px-8 py-3 rounded-xl hover:bg-gray-100 transition-all active:scale-95">
                Continue
            </button>
        </div>

        <p id="toggle-area" class="text-center mt-6 text-sm text-white/30 reveal animate-up [animation-delay:500ms]">
            Already have an account?
            <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>
        </p>
    </div>


    <script>
        let currentStep = 0;
        let isSignIn = false;

        const steps = [
            {
                title: "Create Account",
                sub: "Enter your email to get started.",
                html: `<div class="space-y-4 animate-up">
                    <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Email Address</label>
                    <input type="email" id="email" placeholder="name@gmail.com" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all ">
                </div>`
            },
            {
                title: "Complete Signup",
                sub: "Set your password and name.",
                html: `
                                <div class="space-y-4 animate-up">
                <div class="flex gap-2">
                    <input type="text" placeholder="First Name" class="w-1/2 px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none ">
                    <input type="text" placeholder="Last Name" class="w-1/2 px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none ">
                </div>

                <div class="relative group">
                    <input type="password" id="passwordInput" placeholder="Create a password" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40  transition-all">

                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors focus:outline-none">
                        <i id="toggleIcon" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
                `
            },
            {
                title: "What’s your focus?",
                sub: "Choose the categories you plan to sell.",
                html: ` <div class="grid grid-cols-1 gap-3 categories-options animate-up">
                        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
                            <div class="flex flex-col">
                                <span class="text-white font-medium">Apparel & Accessories</span>
                                <small class="text-white/50">Clothing, shoes, watches, eyeglasses, bags, and jewelry.</small>
                            </div>
                            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                            </div>
                        </div>

                        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
                            <div class="flex flex-col">
                                <span class="text-white font-medium">Home & Garden</span>
                                <small class="text-white/50">Décor, kitchenware, and furniture.</small>
                            </div>
                            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                            </div>
                        </div>

                        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
                            <div class="flex flex-col">
                                <span class="text-white font-medium">Beauty & Wellness</span>
                                <small class="text-white/50">Organic skincare, vegan cosmetics, and personal care.</small>
                            </div>
                            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                            </div>
                        </div>

                        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
                            <div class="flex flex-col">
                                <span class="text-white font-medium">Electronics & Gadgets</span>
                                <small class="text-white/50">High-tech devices, phone accessories, and gamer merch.</small>
                            </div>
                            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                            </div>
                        </div>
                    </div>`
            },
            {
                title: "Choose your sales channels",
                sub: "What is your current strategy?",
                html: `
                                    <div class="grid grid-cols-1 gap-3 categories-options animate-up">
                                    <div class="option-card group relative overflow-hidden p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)" style="
                    height: 100px;
                ">
                        <div class="flex flex-col z-10">
                            <span class="text-white font-medium capitalize">Hybrid Unified Store</span>
                            <small class="text-white/50">POS cashier system synced with your website.</small>
                        </div>

                        <div class="submerged-icon absolute -bottom-5 left-4 opacity-20 pointer-events-none transition-all duration-500 ease-in-out group-hover:-translate-y-2 flex gap-2">
                            <i class="bi bi-globe text-4xl text-white"></i>
                            <i class="bi bi-pc-display text-4xl text-white"></i>
                        </div>

                        <div class="check-box z-10 w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                            <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                        </div>
                    </div>
                    <div class="option-card group relative overflow-hidden p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)" style="
                    height: 100px;
                ">
                        <div class="flex flex-col z-10">
                            <span class="text-white font-medium capitalize">Online Store</span>
                            <small class="text-white/50">Sell through a powerful, custom-branded website.</small>
                        </div>

                        <div class="submerged-icon absolute -bottom-5 left-4 opacity-20 pointer-events-none transition-all duration-500 ease-in-out group-hover:-translate-y-2">
                            <i class="bi bi-globe text-4xl text-white"></i>
                        </div>

                        <div class="check-box z-10 w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                            <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                        </div>
                    </div>

                    <div class="option-card group relative overflow-hidden p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)" style="
                    height: 100px;
                ">
                        <div class="flex flex-col z-10">
                            <span class="text-white font-medium capitalize">POS Setup</span>
                            <small class="text-white/50">POS cashier system only.</small>
                        </div>

                        <div class="submerged-icon absolute -bottom-5 left-4 opacity-20 pointer-events-none transition-all duration-500 ease-in-out group-hover:-translate-y-2 flex gap-1">
                            <i class="bi bi-pc-display text-4xl text-white"></i>
                        </div>

                        <div class="check-box z-10 w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                            <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
                        </div>
                    </div>
                </div>
                    `
            },
            {
                title: "Inventory Size",
                sub: "Choose the plan that fits your needs.",
                html: `<div class="grid grid-cols-1 gap-3 categories-options animate-up">
        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium">1 - 5 item</span>
                    <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full text-white/70 border border-white/10">50 EGP/mo</span>
                </div>
                <small class="text-white/50">Perfect for a boutique setup or single product launch.</small>
            </div>
            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
            </div>
        </div>

        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium">5 - 20 item</span>
                    <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full text-white/70 border border-white/10">150 EGP/mo</span>
                </div>
                <small class="text-white/50">Ideal for small collections and growing brands.</small>
            </div>
            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
            </div>
        </div>

        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium">20 - 100 item</span>
                    <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full text-white/70 border border-white/10">250 EGP/mo</span>
                </div>
                <small class="text-white/50">A comprehensive catalog for established shops.</small>
            </div>
            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
            </div>
        </div>

        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium">100 - 300 item</span>
                    <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full text-white/70 border border-white/10">650 EGP/mo</span>
                </div>
                <small class="text-white/50">High-volume inventory with multiple categories.</small>
            </div>
            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
            </div>
        </div>

        <div class="option-card p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300" onclick="setChoice(this)">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium">300 - 750 item</span>
                    <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full text-white/70 border border-white/10">1200 EGP/mo</span>
                </div>
                <small class="text-white/50">Large scale enterprise-level product management.</small>
            </div>
            <div class="check-box w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg scale-0 transition-transform duration-200 text-black"></i>
            </div>
        </div>
    </div>`
            },
            {
                title: "Store Name",
                sub: "What should we call your store?",
                html: `<div class="space-y-4 animate-up">
                    <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Store Name</label>
                    <input type="text" placeholder="My Awesome Store" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40">
                </div>
                `
            }

        ];

        function render() {
            const content = document.getElementById('step-content');
            const data = steps[currentStep];

            // content.style.opacity = '0';
            setTimeout(() => {
                content.innerHTML = `
                    <h1 class="text-xl font-semibold tracking-tight mb-1 animate-up">${data.title}</h1>
                    <p class="text-sm text-white/40 mb-8 animate-up">${data.sub}</p>
                    ${data.html}
                `;
                // content.style.opacity = '1';
                updateIndicators();
            }, 200);
        }

        function updateIndicators() {
            const dots = document.querySelectorAll('.dot');
            const backBtn = document.getElementById('back-btn');
            const toggle = document.getElementById('toggle-area');
            const indicators = document.getElementById('step-indicators');

            // Hide/Show Back button and Toggle area
            backBtn.style.display = (currentStep === 0 || isSignIn) ? 'none' : 'block';
            toggle.style.display = (currentStep === 0) ? 'block' : 'none';

            // Hide indicators on Sign In
            indicators.style.opacity = isSignIn ? '0' : '1';

            // Glow logic
            dots.forEach((dot, i) => {
                if (i === currentStep) {
                    dot.classList.add('w-2.5', 'h-2.5', 'shadow-[0_0_12px_#fff]', 'bg-white');
                    dot.classList.remove('w-1.5', 'h-1.5', 'bg-white/20');
                } else {
                    dot.classList.remove('w-2.5', 'h-2.5', 'shadow-[0_0_12px_#fff]', 'bg-white');
                    dot.classList.add('w-1.5', 'h-1.5', 'bg-white/20');
                }
            });
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                render();
            } else {
                alert("Account Building Complete!");
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                render();
            }
        }

        function setChoice(el) {
            // 1. Get the parent container of the clicked element
            const container = el.parentElement;

            // 2. Remove 'selected' from all other siblings within this container
            container.querySelectorAll('.option-card').forEach(card => {
                if (card !== el) {
                    card.classList.remove('selected');
                }
            });

            el.classList.toggle('selected');
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');

            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function toggleSignIn() {
            isSignIn = !isSignIn;
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');

            if (isSignIn) {
                content.innerHTML = `
                   <h1 class="text-xl font-semibold tracking-tight mb-1 animate-up">Welcome Back</h1>
    <p class="text-sm text-white/40 mb-8 animate-up">Enter your credentials to access your store.</p>

    <div class="space-y-4 animate-up">
        <input type="email" placeholder="Email Address" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/30 transition-colors ">

        <div class="space-y-2">
            <input type="password" placeholder="Password" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/30 transition-colors ">

            <div class="flex justify-end px-1">
                <button onclick="handleForgotPassword()" class="text-xs text-white/40 hover:text-white transition-colors">
                    Forgot Password?
                </button>
            </div>
        </div>
    </div>
                `;
                nextBtn.innerText = "Sign In";
                document.getElementById('toggle-area').innerHTML = `Don't have an account? <button onclick="toggleSignIn()" class="text-white font-medium">Sign Up</button>`;
                updateIndicators();
            } else {
                currentStep = 0;
                nextBtn.innerText = "Continue";
                document.getElementById('toggle-area').innerHTML = `Already have an account? <button onclick="toggleSignIn()" class="text-white font-medium">Sign In</button>`;
                render();
            }
        }

        function handleForgotPassword() {
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const toggleArea = document.getElementById('toggle-area');

            // 1. Change UI to Email Input
            content.innerHTML = `
        <div class="animate-up">
            <h1 class="text-xl font-semibold tracking-tight mb-1">Reset Password</h1>
            <p class="text-sm text-white/40 mb-8">Enter your email and we'll send you a retrieval link.</p>
            
            <div class="space-y-4">
                <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Email Address</label>
                <input type="email" id="resetEmail" placeholder="name@gmail.com" 
                    class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
            </div>
            
            <div id="status-message" class="mt-4 text-sm hidden"></div>
        </div>
    `;

            // 2. Update the Main Button
            nextBtn.innerText = "Send Retrieval Link";
            nextBtn.onclick = () => sendResetLink();

            // 3. Update Toggle Area to allow going back to Sign In
            toggleArea.innerHTML = `Remembered your password? <button onclick="toggleSignIn()" class="text-white font-medium">Sign In</button>`;
        }

        function sendResetLink() {
            const emailInput = document.getElementById('resetEmail');
            const statusMsg = document.getElementById('status-message');
            const nextBtn = document.getElementById('next-btn');
            const email = emailInput.value.trim();

            if (!email || !email.includes('@')) {
                statusMsg.innerText = "Please enter a valid email address.";
                statusMsg.className = "mt-4 text-sm text-red-400 animate-up";
                statusMsg.classList.remove('hidden');
                return;
            }

            // Show loading state
            nextBtn.innerText = "Sending...";
            nextBtn.disabled = true;
            nextBtn.style.opacity = "0.5";

            setTimeout(() => {
                // Construct Gmail URL
                const gmailUrl = "https://mail.google.com/mail/u/0/#search/from%3AMatager+reset";

                statusMsg.innerHTML = `
            <div class="flex items-start gap-3 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl animate-up">
                <i class="bi bi-check-circle-fill text-emerald-400 mt-1"></i>
                <div class="space-y-2">
                    <p class="text-emerald-400 font-bold text-sm">Reset Link Sent!</p>
                    <p class="text-white/60 text-xs leading-relaxed">
                        We've sent a recovery link to <span class="text-white font-medium">${email}</span>.
                    </p>
                    <a href="${gmailUrl}" target="_blank" 
                       class="inline-flex items-center gap-2 text-[11px] font-bold text-emerald-400 hover:text-emerald-300 transition-colors uppercase tracking-wider group">
                        Open Gmail Inbox 
                        <i class="bi bi-box-arrow-up-right text-[10px] group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                    </a>
                </div>
            </div>
        `;

                statusMsg.className = "mt-6";
                statusMsg.classList.remove('hidden');

                nextBtn.innerText = "Resend Link";
                nextBtn.disabled = false;
                nextBtn.style.opacity = "1";
            }, 1200);
        }
        // Initial Load
        render();
    </script>
</body>

</html>
